app:
  title: Roadmap Dev App
  baseUrl: http://localhost:3000

backend:
  baseUrl: http://localhost:7007
  listen:
    port: 7007
  csp:
    connect-src: ["'self'", 'http:', 'https:']
  cors:
    origin: http://localhost:3000
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  database:
    client: better-sqlite3
    connection: ':memory:'

auth:
  providers:
    guest:
      # Match the seeded catalog user (examples/org.yaml) so author and
      # commenter refs resolve to a real entity in the dev catalog.
      userEntityRef: user:default/guest

permission:
  enabled: true

# Fast search collation for local development and e2e (production default is 10 min)
search:
  collators:
    roadmap:
      schedule:
        frequency: { seconds: 10 }
        timeout: { minutes: 5 }
        initialDelay: { seconds: 3 }

roadmap:
  adminUsers:
    - 'user:default/guest'
    # Second admin so new-suggestion notifications fire locally (the acting
    # guest user is excluded from their own notifications).
    - 'user:default/roadmap-admin'

catalog:
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration
  rules:
    - allow: [Component, System, API, Resource, Location]
  locations:
    # Local example data, file locations are relative to the backend process, typically `packages/backend`
    - type: file
      target: ../../examples/entities.yaml

    # Local example template
    - type: file
      target: ../../examples/template/template.yaml
      rules:
        - allow: [Template]

    # Local example organizational data
    - type: file
      target: ../../examples/org.yaml
      rules:
        - allow: [User, Group]
