name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@63c24ba6bd7ba022e95695ff85de572c04a18142 # v2.7.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Check for changeset
        if: github.event_name == 'pull_request'
        run: yarn changeset status --since origin/main

      - name: Lint
        run: yarn lint:all

      - name: Type check
        run: yarn tsc

      - name: Verify API reports
        run: yarn build:api-reports && git diff --exit-code -- '**/report.api.md'

      - name: Build
        run: yarn build:all

      - name: Test
        # The database suite runs in its own step: loading the better-sqlite3
        # native module twice in one jest worker segfaults on Linux, so it
        # cannot share a process with the other sqlite-backed suite.
        run: yarn test:all --testPathIgnorePatterns=RoadmapDatabaseClient.test.ts

      - name: Test database suite
        run: yarn workspace @rothenbergt/backstage-plugin-roadmap-backend test --watchAll=false --runInBand RoadmapDatabaseClient
