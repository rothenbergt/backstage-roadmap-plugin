---
# https://backstage.io/docs/features/software-catalog/descriptor-format#kind-user
apiVersion: backstage.io/v1alpha1
kind: User
metadata:
  name: guest
spec:
  memberOf: [guests]
---
# https://backstage.io/docs/features/software-catalog/descriptor-format#kind-group
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: guests
spec:
  type: team
  children: []
---
# A second user so roadmap notifications can be demoed locally: the guest
# author is excluded from their own notifications, this user is not.
apiVersion: backstage.io/v1alpha1
kind: User
metadata:
  name: roadmap-admin
spec:
  memberOf: [guests]
---
# Demo users so seeded roadmap data (votes, comments, authors) resolves to
# real catalog entities with display names.
apiVersion: backstage.io/v1alpha1
kind: User
metadata:
  name: mchen
spec:
  profile:
    displayName: Maya Chen
  memberOf: [guests]
